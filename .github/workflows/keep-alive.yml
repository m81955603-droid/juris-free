name: Keep-Alive Services
on:
  schedule:
    - cron: '0 9 */5 * *'
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}"
          echo Supabase OK
      - name: Ping Oracle VM
        run: |
          curl -s "${{ secrets.ORACLE_VM_URL }}/health" || true
          echo Oracle VM ping enviado
